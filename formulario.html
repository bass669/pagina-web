        <style>
            /* ESTILOS DE INTEGRACIÓN PARA EL FORMULARIO */
            
            /* Contenedor principal del formulario */
            .Contac-form {
                background-color: #121212; /* Fondo oscuro igual al resto de la web */
                padding: 40px;
                border-radius: 15px;
                border: 1px solid #e60000; /* Borde rojo característico */
                box-shadow: 0 8px 25px rgba(230, 0, 0, 0.15); /* Resplandor rojo sutil */
                margin-bottom: 50px;
            }

            .Contac-form h3 {
                color: #ffffff;
                font-family: "Josefin Sans", sans-serif;
                text-align: center;
                margin-bottom: 30px;
            }

            .Contac-form hr {
                border-top: 1px solid #e60000;
                opacity: 0.5;
            }

            .form-label {
                color: #cccccc;
                font-family: "Open Sans", sans-serif;
                font-weight: 500;
            }

            /* Estilización de Inputs y Selects al modo oscuro */
            .form-control, .form-select {
                background-color: #1a1a1a;
                border: 1px solid #333333;
                color: #ffffff;
                font-family: "Open Sans", sans-serif;
                transition: all 0.3s ease;
            }

            /* Quitar el borde azul por defecto de Bootstrap y poner rojo */
            .form-control:focus, .form-select:focus {
                background-color: #0a0a0a;
                border-color: #e60000;
                box-shadow: 0 0 8px rgba(230, 0, 0, 0.6);
                color: #ffffff;
            }

            .form-control::placeholder {
                color: #777777;
            }

            /* Modificar el botón de Bootstrap para que encaje con tu diseño */
            .btn-enviar {
                background: transparent;
                border: 2px solid #e60000;
                color: white;
                padding: 12px 30px;
                border-radius: 5px;
                cursor: pointer;
                transition: all 0.3s;
                font-family: "Lato", sans-serif;
                font-weight: bold;
                text-transform: uppercase;
                width: 100%;
                margin-top: 10px;
            }

            .btn-enviar:hover {
                background: #e60000;
                color: #ffffff;
                box-shadow: 0 5px 15px rgba(230, 0, 0, 0.4);
                transform: translateY(-2px);
            }
            
            /* Ajuste de títulos principales en la página de formulario */
            main h2 {
                color: #e60000;
                margin-top: 40px;
            }
        </style>

        <main class="d-flex flex-column align-items-center">
            <h2><b>CONTACTO</b></h2><br>
            <div class="container d-flex justify-content-center">
                <form class="Contac-form w-100" style="max-width: 800px;" method="POST" id="contact-form">
                    <h3>Ponte en contacto con nosotros</h3><hr><br>
                    
                    <div class="row mb-3">
                        <div class="form-group col-md-6 mb-3 mb-md-0">
                            <label for="Name" class="form-label">Nombre</label>
                            <input type="text" class="form-control" name="Name" id="Name" placeholder="Ingrese Nombre" autocomplete="off" required />
                        </div>
                        <div class="form-group col-md-6">
                            <label for="LastName" class="form-label">Apellidos</label>
                            <input type="text" class="form-control" name="LastName" id="LastName" placeholder="Ingrese Apellidos" autocomplete="off" />
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="form-group col-md-6 mb-3 mb-md-0">
                            <label for="Email" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" name="Email" id="Email" placeholder="correo@ejemplo.com" autocomplete="off" required />
                        </div>
                        <div class="form-group col-md-6">
                            <label for="Fono" class="form-label">Número de Teléfono</label>
                            <input type="text" class="form-control" name="Fono" id="Fono" placeholder="+56 9 1234 5678" autocomplete="off" />
                        </div>
                    </div>
                    
                    <div class="row mb-4">
                        <div class="form-group col-12 mb-3">
                            <label for="servicio" class="form-label">Elige el Servicio de Interés</label>
                            <select class="form-select" id="servicio" name="Servicio" required>
                                <option selected disabled value="">Selecciona un servicio...</option>
                                <option value="Arriendo PC">Arriendo PC (Hardware/Gaming)</option>
                                <option value="Sim Racing">Sim Racing</option>
                                <option value="Realidad Virtual">Realidad Virtual</option>
                                <option value="Consolas">Consolas (PS5 / Switch)</option>
                                <option value="Soporte Tecnico">Soporte Técnico / Redes</option>
                                <option value="Arriendo Equipos">Arriendo de Equipos (Internet/Starlink)</option>
                                <option value="Streaming">Streaming / Broadcast</option>
                                <option value="Torneos">Organización de Torneos (E-Sports)</option>
                            </select>
                        </div>
                        
                        <div class="form-group col-12">
                            <label for="detalle" class="form-label">Motivo del contacto / Detalles</label>
                            <textarea class="form-control" name="Mensaje" id="detalle" rows="5" placeholder="Cuéntanos qué necesitas, cantidad de equipos, tipo de evento y cualquier referencia útil..." required></textarea>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-12 text-center">
                            <button type="submit" id="button" class="btn-enviar">Enviar Mensaje</button>
                        </div>
                    </div>
                </form>
            </div>
        </main>
