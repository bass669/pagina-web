        <main>
            <h2><b>Contacto</b></h2><br>
            <div class="container">
                <form class="Contac-form" method="POST" id="contact-form">
                    <h3>Formulario de Contacto</h3><hr><br>
                    <!--Fila 1-->
                    <div class="form-input-material">
                        <div class="row">
                            <div class="form-group col-md-5">
                                <label for="Name"class="form-label">Nombre</label>
                                <input type="text" class="form-control" name="Name" id="Name" placeholder="Ingrese Nombre" autocomplete="off" required />
                            </div>
                            <div class="form-group col-md-6">
                                <label for="LastName"class="form-label">Apellidos</label>
                                <input type="text" class="form-control" name="LastName" id="LastName" placeholder="Ingrese Apellidos" autocomplete="off" />
                            </div>
                        </div>
                    </div>
                    <!--Fila 2-->
                    <div class="form-input-material">
                        <div class="row">
                            <div class="form-group col-md-6">
                                <label for="Email" class="form-label">Correo</label>
                                <input type="email" class="form-control" name="Email" id="Email" 
                                placeholder="name@example.com" autocomplete="off" required />
                            </div>
                            <div class="form-group col-md-4">
                                <label for="Fono" class="form-label">Numero Telefono</label>
                                <input type="text" class="form-control" name="Fono" id="Fono" 
                                placeholder="Ingrese Numero Telefonico" autocomplete="off" />
                            </div>
                        </div>
                    </div>
                    <!--Fila 3-->
                    <div class="form-input-material">
                        <label for="servicio" class="form-label">Eliga Servico de Interes</label>
                        <div class="form-group col-md-6">
                            <select class="form-select" aria-label="Default select example"
                                id="servicio" name="Servicio" required>
                                <option selected>Servicio de Interes</option>
                                <option value="1">One</option>
                                <option value="2">Two</option>
                                <option value="3">Three</option>
                                <option value="4">Four</option>
                                <option value="5">Five</option>
                                <option value="6">Six</option>
                                <option value="7">Seven</option>
                                <option value="8">Eigh</option>
                            </select>
                        </div>
                        <br>
                        <label for="Motivo" class="form-label">Motivo del contacto</label>
                        <div class="form-group col-md-10">
                            <textarea class="form-control" name="Mensaje" id="detalle" rows="6"
                                placeholder="Detalle motivo" required></textarea>
                        </div>
                    </div>
                    <button type="submit" id="button" class="btn btn-outline-primary btn-ghost">Enviar</button>
                </form>
            </div>
        </main>
