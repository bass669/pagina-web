        /* Estilos exclusivos para la cuadrícula de la galería */
        body {
            background-color: #121212; /* Mantiene el fondo oscuro */
        }
        .galeria-container {
            padding: 4rem 0;
            min-height: 70vh;
        }
        .galeria-item {
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #e60000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }
        .galeria-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(230, 0, 0, 0.5); /* Resplandor rojo al pasar el mouse */
            z-index: 2;
        }
        .galeria-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease;
        }
        .galeria-item:hover img {
            filter: brightness(1.2);
        }
    </style>

   <script>
    // Contenedor donde van las fotos
    const contenedor = document.getElementById('contenedor-galeria');

    // Función que cargar las imágenes una por una
    function cargarImagen(numero) {
        // Crea una imagen "invisible" en memoria para probar si existe
        const imgPrueba = new Image();
        
        // SÍ existe
        imgPrueba.onload = function() {
            // Crear la estructura HTML
            const divCol = document.createElement('div');
            divCol.className = 'col-lg-4 col-md-6';
            
            divCol.innerHTML = `
                <div class="galeria-item">
                    <img src="img/galeria/${numero}.png" alt="Evento Pro Hardware">
                </div>
            `;
            
            // Se inyecta en la página
            contenedor.appendChild(divCol);
            
            // Cargar el número siguiente
            cargarImagen(numero + 1);
        };

        // Si la imagen NO existe (llegamos al final)
        imgPrueba.onerror = function() {
            // Aquí el script simplemente se detiene, ya no busca más.
            console.log("Carga de galería terminada. Total de fotos: " + (numero - 1));
        };

        // Al asignarle la ruta, disparamos el intento de carga (onload o onerror)
        // Asegúrate de que todas tus fotos sean .png (o cambia la extensión aquí si usas .jpg)
        imgPrueba.src = `img/galeria/${numero}.png`;
    }

    // Iniciamos el ciclo buscando la foto número 1
    cargarImagen(1);
</script>
