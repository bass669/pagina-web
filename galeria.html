    <style>
        /* Estilos exclusivos para la cuadrícula de la galería */
        body {
            background-color: #121212; /* Mantiene el fondo oscuro */
        }
        .galeria-container {
            padding: 4rem 0;
            min-height: 70vh;
        }
        .galeria-item {
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 15px;
            border: 2px solid #e60000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }
        .galeria-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(230, 0, 0, 0.5); /* Resplandor rojo al pasar el mouse */
            z-index: 2;
        }
        .galeria-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: filter 0.4s ease;
        }
        .galeria-item:hover img {
            filter: brightness(1.2);
        }
    </style>
</head>
